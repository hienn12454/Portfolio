name: Azure Static Web Apps CI/CD
# deploy fe
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    environment: production
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Validate required frontend env
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_JWT_TEMPLATE: ${{ secrets.VITE_CLERK_JWT_TEMPLATE }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Missing required secret: VITE_API_BASE_URL"
            exit 1
          fi
          if [ -z "$VITE_CLERK_PUBLISHABLE_KEY" ]; then
            echo "Missing required secret: VITE_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          if [ -z "$VITE_CLERK_JWT_TEMPLATE" ]; then
            echo "Missing required secret: VITE_CLERK_JWT_TEMPLATE"
            exit 1
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_JWT_TEMPLATE: ${{ secrets.VITE_CLERK_JWT_TEMPLATE }}
          VITE_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${{ secrets.VITE_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL }}
          VITE_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${{ secrets.VITE_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_BEACH_0AE56A600 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./Portfolio-FE" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  deploy_backend_job:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    name: Deploy Backend API Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend dependencies
        run: dotnet restore "./Portfolio-BE/src/Portfolio.Api/Portfolio.Api.csproj"

      - name: Publish backend
        run: dotnet publish "./Portfolio-BE/src/Portfolio.Api/Portfolio.Api.csproj" -c Release -o "${{ github.workspace }}/backend-publish"

      - name: Validate backend publish profile
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE_BE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE_BE" ]; then
            echo "Missing required secret: AZURE_WEBAPP_PUBLISH_PROFILE_BE"
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PortfolioBE'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: "${{ github.workspace }}/backend-publish"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_BEACH_0AE56A600 }}
          action: "close"
